name: release
on: 
    push:
        branches: [ main ]
          tags:
            - "v*.*.*"
jobs:
  build:
    runs-on: ubuntu-latest
    steps: 
     - name: Checkout 
       uses: actions/checkout@v6.0.2
     - name: Flutter setup
       uses: subosito/flutter-action@v2
       with:
        channel: stable
        run: flutter --version
     - name: Run script build_release.sh
       run: build_release.sh
     - name: Release
       uses: softprops/action-gh-release@v2
       make_lastest: true
       with:
        files: |
        "build/windows/x64/runner/Windows-x64.zip"
        "build/app/outputs/flutter-apk/Android-armeabi-v7a.apk"
        "build/app/outputs/flutter-apk/Android-arm64-v8a.apk"
        "build/app/outputs/flutter-apk/Android-x86-64.apk"
        "build/app/outputs/flutter-apk/Android-universal.apk"

      
