name: Build and Release

on: 
  push: 
    branches: [ main ]
    tags: 
      -"v*.*.*"
jobs: 
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2
      - name: Flutter Setup
        uses: subosito/flutter-action@v2.21.0
        with:
          channel: stable
      - name: Check Flutter version
        run: flutter --version
      - name: build_release.sh para generar y renombrar builds
        run: bash ./.github/build_release.sh
      - name: Release builds
        uses: softprops/action-gh-release@v2.5.0
        with:
          body_path: .github\release_body.md
          prerelease: true
          files: |
            build/app/outputs/flutter-apk/Android-universal.apk
            build/app/outputs/flutter-apk/Android-arm64-v8a.apk
            build/app/outputs/flutter-apk/Android-x86-64.apk
            build/app/outputs/flutter-apk/Android-armeabi-v7a.apk
            build/windows/x64/runner/Release/Windows-x64.zip

            
